seed: 42
device: cpu

data:
  root: ./data
  image_size: 32
  num_classes: 10
  flatten: true

coreset:
  keep_ratio: 0.1
  init_mode: random_subset

graph:
  k: 10
  sigma: 1.0
  normalized_laplacian: true

sampling:
  num_frequencies: 64
  schedule_steps: 100
  max_frequency_norm: 8.0

optimize:
  steps: 5
  lr: 0.001
  lambda_div: 0.1
  lambda_align: 1.0
  lambda_graph: 0.1

eval:
  backbone: resnet18
  epochs: 1
  batch_size: 32
